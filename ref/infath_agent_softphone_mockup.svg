<title>Agent softphone — RTL mockup, connected-call state (reconstruction)</title>
<desc>Reconstruction of the Arabic-first (RTL) agent softphone mockup shown in chat: screen-pop header (caller name, number, queue), connected-call timer, clickable dialpad, and call-control buttons (mute, hold, transfer, end call). Exact original pixels were not preserved in the plain-text chat export; layout and copy are a reasonable reconstruction from the description.</desc>


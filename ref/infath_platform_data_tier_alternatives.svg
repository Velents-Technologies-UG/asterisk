<svg width="100%" viewBox="0 0 780 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif">
<title>Platform &amp; data tier — alternatives</title>
<desc>The shared backbone every service sits on: event bus (Kafka primary vs NATS), primary datastore (unspecified in source), object store for recordings (MinIO self-hosted or a KSA cloud S3-compatible service, in-region only, never a default US bucket), and cache (Redis primary vs Valkey, near-equivalent).</desc>

<rect x="0" y="0" width="780" height="300" fill="white"/>

<text x="24" y="28" font-size="16" font-weight="600" fill="#0B0B0B">Platform &amp; data tier — the shared backbone</text>
<text x="24" y="46" font-size="12" fill="#52514E">teal = primary / already in stack · gray = drop-in alternative · dashed = open decision</text>

<text x="90" y="80" font-size="12" font-weight="500" fill="#52514E">Event bus</text>
<rect x="24" y="88" width="140" height="42" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="94" y="113" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Kafka</text>
<rect x="24" y="140" width="140" height="38" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="94" y="163" text-anchor="middle" font-size="13" fill="#444441">NATS</text>
<text x="94" y="192" text-anchor="middle" font-size="11" fill="#898781">weight vs. simplicity — real tradeoff</text>

<text x="270" y="80" font-size="12" font-weight="500" fill="#52514E">Primary datastore</text>
<rect x="200" y="88" width="140" height="42" rx="8" fill="#F1EFE8" stroke="#898781" stroke-dasharray="4 3"/>
<text x="270" y="113" text-anchor="middle" font-size="13" fill="#5F5E5A">not named in source</text>
<text x="270" y="150" text-anchor="middle" font-size="11" fill="#898781">open decision — pick and record it</text>

<text x="446" y="80" font-size="12" font-weight="500" fill="#52514E">Object store (recordings)</text>
<rect x="376" y="88" width="140" height="42" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="446" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">MinIO</text>
<text x="446" y="122" text-anchor="middle" font-size="11" fill="#0F6E56">self-hosted, in-region</text>
<rect x="376" y="140" width="140" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="446" y="160" text-anchor="middle" font-size="12" fill="#444441">KSA cloud</text>
<text x="446" y="176" text-anchor="middle" font-size="11" fill="#5F5E5A">S3-compatible, in-region</text>
<text x="446" y="200" text-anchor="middle" font-size="11" fill="#993C1D" font-weight="500">never a default US bucket — PDPL/NCA (AGH-6685)</text>

<text x="622" y="80" font-size="12" font-weight="500" fill="#52514E">Cache</text>
<rect x="552" y="88" width="140" height="42" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="622" y="113" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Redis</text>
<rect x="552" y="140" width="140" height="38" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="622" y="163" text-anchor="middle" font-size="13" fill="#444441">Valkey</text>
<text x="622" y="192" text-anchor="middle" font-size="11" fill="#898781">near-equivalent — open-source Redis fork</text>

<rect x="24" y="238" width="732" height="42" rx="8" fill="#FAECE7" stroke="#993C1D"/>
<text x="40" y="255" font-size="12" font-weight="500" fill="#993C1D">Compliance-bearing pick:</text>
<text x="40" y="271" font-size="12" fill="#7A2E15">the object store choice is the one with a direct residency/retention constraint — everything else here is closer to a team-preference call.</text>
</svg>

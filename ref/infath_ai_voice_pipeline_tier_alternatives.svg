<rect x="24" y="196" width="712" height="70" rx="8" fill="#FAECE7" stroke="#993C1D"/>
<text x="40" y="215" font-size="12" font-weight="500" fill="#993C1D">Two things this diagram cannot certify without the original image:</text>
<text x="40" y="233" font-size="12" fill="#7A2E15">1. Which STT/TTS/LLM vendors were marked primary vs. alternative — selection criterion is Gulf-Arabic dialect accuracy, not brand.</text>
<text x="40" y="251" font-size="12" fill="#7A2E15">2. Confirmed constraint that carries over regardless: every component must run in-region — residency rules some managed options in or out.</text>

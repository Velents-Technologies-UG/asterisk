<title>AI voice pipeline tier — alternatives (partial reconstruction)</title>
<desc>Real-time AI voice pipeline: audio fork to Arabic STT to LLM (optional NLU/RAG) to TTS, back into the call. Selection criterion for STT/TTS is Gulf-Arabic dialect accuracy, not brand, and every component must run in-region for PDPL/NCA residency. The original diagram's specific vendor shortlist was shown only as an image and was not preserved in the text export this reconstruction is based on.</desc>


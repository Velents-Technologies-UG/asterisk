<text x="24" y="28" font-size="16" font-weight="600" fill="#0B0B0B">AI voice pipeline — speech in, response out</text>
<text x="24" y="46" font-size="12" fill="#52514E">reconstructed from text only — vendor names in the original image were not preserved</text>

